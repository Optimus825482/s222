services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multiagent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d multiagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: multi-agent-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD:-agent_secret_2024}@postgres:5432/multiagent
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng-pwcsc8ow08oks0ggokwoo8ww.77.42.68.4.sslip.io}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${SERVICE_URL_BACKEND:-http://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io}
        - NEXT_PUBLIC_WS_URL=ws://${SERVICE_FQDN_BACKEND:-ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io}/ws/chat
    container_name: multi-agent-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${SERVICE_URL_BACKEND:-http://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io}
      - NEXT_PUBLIC_WS_URL=ws://${SERVICE_FQDN_BACKEND:-ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io}/ws/chat
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app-data:
  pgdata:
