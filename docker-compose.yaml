services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multiagent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d multiagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: multi-agent-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: multi-agent-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD:-agent_secret_2024}@postgres:5432/multiagent
      REDIS_URL: redis://redis:6379/0
      REDIS_MODE: ${REDIS_MODE:-standalone}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      WHOOGLE_URL: ${WHOOGLE_URL:-http://whoogle-e4s8oc4kkc8sokcsco808ccw.77.42.68.4.sslip.io}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      POLLINATIONS_API_KEY: ${POLLINATIONS_API_KEY:-}
      PI_GATEWAY_URL: ${PI_GATEWAY_URL:-http://pi-gateway:3100}
      PI_GATEWAY_ENABLED: ${PI_GATEWAY_ENABLED:-true}
      PI_GATEWAY_FALLBACK_ENABLED: ${PI_GATEWAY_FALLBACK_ENABLED:-true}
      PI_GATEWAY_FALLBACK_MAX_RETRIES: ${PI_GATEWAY_FALLBACK_MAX_RETRIES:-2}
      PI_GATEWAY_STREAMING_ENABLED: ${PI_GATEWAY_STREAMING_ENABLED:-true}
      AGENTIC_LOOP_MAX_ITERATIONS: ${AGENTIC_LOOP_MAX_ITERATIONS:-50}
      AGENTIC_LOOP_MAX_TOKENS_BUDGET: ${AGENTIC_LOOP_MAX_TOKENS_BUDGET:-500000}
      AGENTIC_LOOP_MAX_COST_USD: ${AGENTIC_LOOP_MAX_COST_USD:-5.00}
      AGENTIC_FOLLOWUP_ENABLED: ${AGENTIC_FOLLOWUP_ENABLED:-true}
      AGENTIC_MAX_FOLLOWUPS: ${AGENTIC_MAX_FOLLOWUPS:-5}
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pi-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/health'')" || exit 1',
        ]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io
        - NEXT_PUBLIC_WS_URL=wss://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io/api/ws/chat
    container_name: multi-agent-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io
      - NEXT_PUBLIC_WS_URL=wss://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io/api/ws/chat
      - BACKEND_URL=http://backend:8000
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    depends_on:
      backend:
        condition: service_started

  pi-gateway:
    build:
      context: ./services/pi-gateway
      dockerfile: Dockerfile
    container_name: multi-agent-pi-gateway
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
  pgdata:
  redis-data:
