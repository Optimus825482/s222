services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multiagent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d multiagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: multi-agent-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD:-agent_secret_2024}@postgres:5432/multiagent
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng-pwcsc8ow08oks0ggokwoo8ww.77.42.68.4.sslip.io}
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/health'')" || exit 1',
        ]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io
        - NEXT_PUBLIC_WS_URL=wss://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io/api/ws/chat
    container_name: multi-agent-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io
      - NEXT_PUBLIC_WS_URL=wss://ykok0ckoooo880w0cwo0w0w0.77.42.68.4.sslip.io/api/ws/chat
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    depends_on:
      backend:
        condition: service_started

volumes:
  app-data:
  pgdata:
