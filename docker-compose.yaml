services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: multiagent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d multiagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multi-agent-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD:-agent_secret_2024}@postgres:5432/multiagent
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multi-agent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8001
      - NEXT_PUBLIC_WS_URL=ws://backend:8001/ws/chat
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app-data:
  pgdata:
