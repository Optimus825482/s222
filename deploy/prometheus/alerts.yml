groups:
  - name: multi-agent-alerts
    rules:
      - alert: HighAgentErrorRate
        expr: |
          rate(agent_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate for agent {{ $labels.agent_role }}"
          description: "Error rate > 0.1/s for 2 minutes"

      - alert: AgentHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(agent_request_duration_seconds_bucket[5m])
          ) > 30
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Agent {{ $labels.agent_role }} p95 latency > 30s"

      - alert: HighCostRate
        expr: |
          rate(agent_cost_usd_total[1h]) > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Cost rate exceeding $0.50/hour"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis instance is down"
